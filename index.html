<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proctor Fellows — Alumni Directory</title>
<style>
  :root{
    --ink:#0f1d2c; --ink-soft:#3d4e5e; --muted:#7a8896;
    --line:#dde4eb; --bg:#f5f7fa; --paper:#ffffff;
    --accent:#0b5394; --accent-soft:#eaf1f8; --accent-deep:#073e6e;
    --gold:#c2933a;
    --shadow-1:0 1px 3px rgba(15,29,44,.05);
    --shadow-2:0 10px 28px rgba(15,29,44,.12);
    --radius:14px;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif;
    --serif:Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--serif); font-size:17px; line-height:1.7;
  }
  .wrap{max-width:1200px; margin:0 auto; padding:0 20px;}
  a{color:var(--accent); text-decoration:none;}
  a:hover{text-decoration:underline;}

  /* ---------- header ---------- */
  .masthead{padding:34px 0 8px;}
  .eyebrow{
    display:inline-block; font-family:var(--sans); font-size:.72rem; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; color:var(--accent);
    background:var(--accent-soft); padding:6px 14px; border-radius:20px; margin:0 0 16px;
  }
  .masthead h1{font-size:2.6rem; line-height:1.1; letter-spacing:-.015em; margin:0 0 12px;}
  .masthead p{color:var(--ink-soft); font-size:1.12rem; max-width:820px; margin:0;}

  /* ---------- controls ---------- */
  .controls{
    position:sticky; top:0; z-index:40;
    background:rgba(245,247,250,.96); backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:14px 0; margin:22px 0 8px;
  }
  .controls-row{display:flex; gap:12px; flex-wrap:wrap; align-items:center;}
  .search{flex:1 1 280px; position:relative; min-width:220px;}
  .search input{
    width:100%; font-family:var(--sans); font-size:.95rem;
    padding:11px 14px 11px 38px; border:1px solid var(--line); border-radius:10px;
    background:var(--paper); color:var(--ink);
  }
  .search input:focus{outline:2px solid var(--accent); outline-offset:0; border-color:var(--accent);}
  .search svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--muted);}
  select{
    font-family:var(--sans); font-size:.9rem; font-weight:600; color:var(--ink-soft);
    padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:var(--paper);
  }
  select:focus{outline:2px solid var(--accent);}
  .count{font-family:var(--sans); font-size:.82rem; color:var(--muted); margin-left:auto; white-space:nowrap;}

  /* decade rail */
  .rail{display:flex; gap:6px; flex-wrap:wrap; margin-top:12px;}
  .rail button{
    font-family:var(--sans); font-size:.8rem; font-weight:600; cursor:pointer;
    color:var(--ink-soft); background:var(--paper); border:1px solid var(--line);
    border-radius:16px; padding:5px 13px;
  }
  .rail button:hover{color:var(--accent); border-color:var(--accent); background:var(--accent-soft);}

  /* ---------- year band ---------- */
  .year-band{
    display:flex; align-items:baseline; gap:14px;
    margin:40px 0 20px; padding-bottom:12px; border-bottom:2px solid var(--accent);
    scroll-margin-top:150px;
  }
  .year-band h2{font-size:1.7rem; font-weight:700; margin:0; letter-spacing:-.01em;}
  .year-band .yb-count{font-family:var(--sans); font-size:.78rem; font-weight:600; color:var(--muted); margin-left:auto;}

  /* ---------- fellow grid + card ---------- */
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:20px;}
  .fellow{
    background:var(--paper); border:1px solid var(--line); border-left:4px solid var(--accent);
    border-radius:var(--radius); box-shadow:var(--shadow-1); overflow:hidden;
    transition:box-shadow .2s ease, transform .2s ease;
  }
  .fellow:hover{box-shadow:var(--shadow-2); transform:translateY(-2px);}
  .fellow-head{
    display:grid; grid-template-columns:96px 1fr 22px; gap:18px; align-items:center;
    width:100%; text-align:left; background:none; border:0; cursor:pointer;
    padding:16px 18px; font-family:var(--serif); color:inherit;
  }
  .photo{
    width:96px; height:96px; border-radius:10px; overflow:hidden; background:var(--bg);
    position:relative; flex-shrink:0;
  }
  .photo img{width:100%; height:100%; object-fit:contain; display:block; background:var(--bg);}
  .photo.empty{display:flex; align-items:center; justify-content:center; border:1px dashed #c5d0db;}
  .photo.empty svg{width:40px; height:40px; color:#c5d0db;}
  .who{min-width:0; display:flex; flex-direction:column; gap:7px;}
  .who .name{display:block; font-size:1.12rem; font-weight:700; line-height:1.35; margin:0;}
  .who .meta{display:block; font-family:var(--sans); font-size:.95rem; font-weight:600; color:var(--muted); line-height:1.35; margin-top:2px;}
  .who .role{
    display:inline-block; align-self:flex-start; font-family:var(--sans); font-size:.66rem; font-weight:700;
    letter-spacing:1.2px; text-transform:uppercase; color:var(--accent);
    background:var(--accent-soft); padding:2px 9px; border-radius:12px; margin-top:2px;
  }
  .chevron{color:var(--muted); font-size:1.1rem; transition:transform .2s ease; justify-self:center;}
  .fellow[open] .chevron{transform:rotate(90deg); color:var(--accent);}

  /* cabinet */
  .cabinet{padding:0 18px; max-height:0; overflow:hidden; transition:max-height .28s ease;}
  .fellow[open] .cabinet{max-height:1200px;}
  .cabinet-inner{padding:4px 0 18px; border-top:1px solid var(--line); margin-top:2px;}
  .cab-section{margin-top:14px;}
  .cab-section h3{
    font-family:var(--sans); font-size:.68rem; font-weight:700; letter-spacing:1.4px;
    text-transform:uppercase; color:var(--accent); margin:0 0 6px;
  }
  .cab-section ul{margin:0; padding:0; list-style:none;}
  .cab-section li{
    font-size:.9rem; color:var(--ink-soft); line-height:1.5; margin:0 0 5px; padding-left:14px; position:relative;
  }
  .cab-section li::before{content:"\203a"; color:var(--accent); position:absolute; left:0; font-weight:700;}
  .cab-empty{font-size:.9rem; color:var(--muted); font-style:italic; padding-top:12px;}

  /* states */
  .state{padding:60px 0; text-align:center; color:var(--muted); font-family:var(--sans);}
  .noresults{padding:40px 0; text-align:center; color:var(--muted); font-family:var(--sans);}

  @media (max-width:880px){
    .grid{grid-template-columns:1fr;}
    .masthead h1{font-size:2rem;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important; scroll-behavior:auto !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <span class="eyebrow">Alumni Directory</span>
    <h1>Proctor Fellows</h1>
    <p>Fellowship alumni from the founding years to today. Search by name, year, or country of origin — or open a card for schooling, current position, and publications from their Proctor years.</p>
  </header>

  <div class="controls">
    <div class="controls-row">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="q" type="search" placeholder="Search name, year, or country…" autocomplete="off" aria-label="Search fellows">
      </div>
      <select id="decade" aria-label="Filter by decade"><option value="">All decades</option></select>
      <select id="country" aria-label="Filter by country"><option value="">All countries</option></select>
      <span class="count" id="count"></span>
    </div>
    <div class="rail" id="rail"></div>
  </div>

  <main id="directory"><div class="state">Loading directory…</div></main>
</div>

<script>
(function(){
  var DATA=[], byYear=[], MAXYEAR=0;

  function startYear(label){
    var m=(label||"").match(/(\d{4})/);
    return m?parseInt(m[1],10):0;
  }
  function bandLabel(y){ return y? (y+"\u2013"+String(y+1).slice(2)) : "Year unknown"; }

  function placeholderSVG(){
    return '<div class="photo empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg></div>';
  }
  function photoHTML(f){
    if(!f.photo) return placeholderSVG();
    return '<div class="photo"><img loading="lazy" src="img/'+f.photo+'" alt="'+escapeHtml(f.name)+'" onerror="this.parentNode.outerHTML=&quot;'+placeholderSVG().replace(/"/g,'&quot;')+'&quot;"></div>';
  }
  function escapeHtml(s){return (s||"").replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

  function cabinet(f){
    var parts=[];
    if(f.position) parts.push('<div class="cab-section"><h3>Current position</h3><ul><li>'+escapeHtml(f.position)+'</li></ul></div>');
    if(f.schooling && f.schooling.length) parts.push('<div class="cab-section"><h3>Training &amp; education</h3><ul>'+f.schooling.map(function(s){return '<li>'+escapeHtml(s)+'</li>';}).join('')+'</ul></div>');
    if(f.publications && f.publications.length) parts.push('<div class="cab-section"><h3>Publications from Proctor years</h3><ul>'+f.publications.map(function(p){return '<li>'+escapeHtml(p)+'</li>';}).join('')+'</ul></div>');
    if(f.links && f.links.length){
      parts.push('<div class="cab-section"><h3>Links</h3><ul>'+f.links.map(function(l){return '<li><a href="'+escapeHtml(l)+'" target="_blank" rel="noopener">'+escapeHtml(l.replace(/^https?:\/\/(www\.)?/,'').split('/')[0])+'</a></li>';}).join('')+'</ul></div>');
    }
    if(!parts.length) return '<div class="cab-empty">More details coming soon.</div>';
    return parts.join('');
  }

  function cardHTML(f){
    var meta=[f.years, f.country].filter(Boolean).join('  \u00b7  ');
    var role=f.role? '<span class="role">'+escapeHtml(f.role)+'</span>':'';
    return '<details class="fellow">'
      +'<summary class="fellow-head">'
        + photoHTML(f)
        +'<span class="who"><span class="name">'+escapeHtml(f.name)+'</span>'
          +'<span class="meta">'+escapeHtml(meta)+'</span>'+role+'</span>'
        +'<span class="chevron">\u203a</span>'
      +'</summary>'
      +'<div class="cabinet"><div class="cabinet-inner">'+cabinet(f)+'</div></div>'
      +'</details>';
  }

  function build(){
    // group by start year desc
    var groups={};
    DATA.forEach(function(f){ f._y=startYear(f.years); (groups[f._y]=groups[f._y]||[]).push(f); });
    byYear=Object.keys(groups).map(Number).sort(function(a,b){return b-a;}).map(function(y){return {y:y,items:groups[y]};});
    MAXYEAR = byYear.length ? byYear[0].y : 0;

    // populate filters
    var decs={}, ctys={};
    DATA.forEach(function(f){ if(f.decade) decs[f.decade]=1; if(f.country) ctys[f.country]=1; });
    var dsel=document.getElementById('decade');
    Object.keys(decs).sort().reverse().forEach(function(d){ dsel.insertAdjacentHTML('beforeend','<option value="'+d+'">'+d+'</option>'); });
    var csel=document.getElementById('country');
    Object.keys(ctys).sort().forEach(function(c){ csel.insertAdjacentHTML('beforeend','<option value="'+escapeHtml(c)+'">'+escapeHtml(c)+'</option>'); });

    // decade rail
    var rail=document.getElementById('rail');
    Object.keys(decs).sort().reverse().forEach(function(d){
      var b=document.createElement('button'); b.textContent=d; b.dataset.decade=d;
      b.onclick=function(){ var el=document.querySelector('[data-decade-anchor="'+d+'"]'); if(el) el.scrollIntoView(); };
      rail.appendChild(b);
    });

    render();
  }

  function render(){
    var q=document.getElementById('q').value.trim().toLowerCase();
    var fd=document.getElementById('decade').value;
    var fc=document.getElementById('country').value;
    var html='', shown=0, seenDecade={};

    byYear.forEach(function(g){
      var items=g.items.filter(function(f){
        if(fd && f.decade!==fd) return false;
        if(fc && f.country!==fc) return false;
        if(q){
          var blob=(f.name+' '+f.years+' '+(f.country||'')+' '+(f.role||'')).toLowerCase();
          if(blob.indexOf(q)===-1) return false;
        }
        return true;
      });
      if(!items.length) return;
      shown+=items.length;
      var anchor='';
      if(g.items[0] && g.items[0].decade && !seenDecade[g.items[0].decade]){
        seenDecade[g.items[0].decade]=1;
        anchor=' data-decade-anchor="'+g.items[0].decade+'"';
      }
      var heading = (g.y===MAXYEAR) ? 'Current Fellows' : bandLabel(g.y);
      html+='<section class="year-block"><div class="year-band"'+anchor+'><h2>'+heading+'</h2>'
           +'<span class="yb-count">'+items.length+(items.length===1?' fellow':' fellows')+'</span></div>'
           +'<div class="grid">'+items.map(cardHTML).join('')+'</div></section>';
    });

    var dir=document.getElementById('directory');
    dir.innerHTML = shown? html : '<div class="noresults">No fellows match that search. Try a name, a year like 2015, or a country.</div>';
    document.getElementById('count').textContent = shown+' of '+DATA.length+' fellows';
    postHeight();
  }

  // live filtering
  ['q','decade','country'].forEach(function(id){
    document.addEventListener('input', function(e){ if(e.target.id===id) render(); });
  });

  // iframe auto-resize (optional; parent listens for {proctorFellowsHeight})
  function postHeight(){
    if(window.parent!==window){
      try{ window.parent.postMessage({proctorFellowsHeight:document.body.scrollHeight}, '*'); }catch(e){}
    }
  }
  window.addEventListener('load', postHeight);
  document.addEventListener('toggle', function(e){ if(e.target.classList && e.target.classList.contains('fellow')) postHeight(); }, true);

  // load data
  fetch('fellows.json', {cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(json){ DATA=json; build(); })
    .catch(function(err){
      document.getElementById('directory').innerHTML=
        '<div class="state">Could not load <strong>fellows.json</strong>.<br>'
        +'This page must be served over http(s) — it works on GitHub Pages. '
        +'To preview locally, run a small web server in this folder rather than opening the file directly.</div>';
    });
})();
</script>
</body>
</html>
